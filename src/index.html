<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Azure SWA Image Conversion App">
    <title>PixelFlow | Image Conversion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>PixelFlow</h1>
            <p>Sleek and fast image conversion powered by Azure & Pillow.</p>
        </header>

        <main class="glass-panel">
            <div class="upload-section" id="drop-zone">
                <input type="file" id="file-input" accept="image/*" hidden>
                <div class="upload-content">
                    <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    <p>Drag and drop an image here</p>
                    <span>or <button id="browse-btn">browse files</button></span>
                </div>
            </div>

            <div class="preview-section hidden" id="preview-section">
                <div class="image-container">
                    <h3>Original</h3>
                    <img id="original-image" alt="Original Image">
                </div>
                
                <div class="action-bar">
                    <button id="convert-btn" class="primary-btn">Convert to Grayscale (JPEG)</button>
                    <div id="loader" class="loader hidden"></div>
                </div>

                <div class="image-container hidden" id="result-container">
                    <h3>Converted Result</h3>
                    <img id="converted-image" alt="Converted Image">
                    <a id="download-link" class="secondary-btn" download="converted-image.jpg">Download Image</a>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
